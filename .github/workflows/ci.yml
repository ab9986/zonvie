name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            zig_host: aarch64-macos
          - arch: x86_64
            runner: macos-15-intel
            zig_host: x86_64-macos
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Homebrew)
        run: brew install freetype harfbuzz

      - name: Download and Setup Zig
        run: |
          curl -L -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-${{ matrix.zig_host }}-${ZIG_VERSION}.tar.xz"
          tar -xf zig.tar.xz
          echo "$PWD/zig-${{ matrix.zig_host }}-${ZIG_VERSION}" >> $GITHUB_PATH

      - name: Build Zig Core (macOS)
        run: zig build

      - name: Build macOS App
        run: |
          xcodebuild -project macos/zonvie.xcodeproj \
            -scheme zonvie \
            -configuration Debug \
            -derivedDataPath macos/.derived \
            -destination "platform=macOS,arch=${{ matrix.arch }}" \
            build

      - name: Upload macOS Build
        uses: actions/upload-artifact@v4
        with:
          name: zonvie-macos-${{ matrix.arch }}-debug
          path: macos/.derived/Build/Products/Debug/zonvie.app

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x64
            target: x86_64-windows-gnu
          - arch: arm64
            target: aarch64-windows-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Download and Setup Zig
        run: |
          curl -L -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> $GITHUB_PATH

      - name: Check shader bytecode freshness
        run: python3 windows/shaders/check_shader_hash.py

      - name: Build Windows App
        run: zig build windows -Dtarget=${{ matrix.target }}

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: zonvie-windows-${{ matrix.arch }}-debug
          path: windows/zig-out/zonvie.exe

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and Setup Zig
        run: |
          curl -L -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> $GITHUB_PATH

      - name: Run Zig Tests
        run: zig build test || echo "No tests defined"
