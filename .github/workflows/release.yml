name: Release

on:
  push:
    tags:
      - 'v*'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build-windows:
    name: Build Windows Release (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: x64
            target: x86_64-windows-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Download and Setup Zig
        run: |
          curl -L -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> $GITHUB_PATH

      - name: Build Windows App (Release)
        run: zig build windows -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast

      - name: Create Windows ZIP
        run: |
          ZIP_NAME="zonvie-${{ github.ref_name }}-windows-${{ matrix.arch }}.zip"
          cd windows/zig-out
          zip -r "../../$ZIP_NAME" zonvie.exe
          cd ../..

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ matrix.arch }}
          path: "*.zip"

  create-release:
    name: Create GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*-release-*'
          path: artifacts/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          tag: v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
