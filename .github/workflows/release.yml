name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  ZIG_VERSION: "0.15.2"

jobs:
  build-macos:
    name: Build macOS Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Download and Setup Zig
        run: |
          curl -L -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-aarch64-macos-${ZIG_VERSION}.tar.xz"
          tar -xf zig.tar.xz
          echo "$PWD/zig-aarch64-macos-${ZIG_VERSION}" >> $GITHUB_PATH

      - name: Build Zig Core (macOS)
        run: zig build -Doptimize=ReleaseFast

      - name: Build macOS App (Release)
        run: |
          xcodebuild -project macos/zonvie.xcodeproj \
            -scheme zonvie \
            -configuration Release \
            -derivedDataPath macos/.derived \
            -destination "platform=macOS,arch=arm64" \
            build

      - name: Create macOS DMG
        run: |
          APP_PATH="macos/.derived/Build/Products/Release/zonvie.app"
          DMG_NAME="zonvie-${{ github.ref_name }}-macos-arm64.dmg"

          # Create temporary directory for DMG contents
          mkdir -p dmg_contents
          cp -R "$APP_PATH" dmg_contents/
          ln -s /Applications dmg_contents/Applications

          # Create DMG
          hdiutil create -volname "Zonvie" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            "$DMG_NAME"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: "*.dmg"

  build-windows:
    name: Build Windows Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download and Setup Zig
        run: |
          curl -L -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-${ZIG_VERSION}" >> $GITHUB_PATH

      - name: Build Windows App (Release)
        run: zig build windows -Dtarget=x86_64-windows-gnu -Doptimize=ReleaseFast

      - name: Create Windows ZIP
        run: |
          ZIP_NAME="zonvie-${{ github.ref_name }}-windows-x64.zip"
          cd zig-out/bin
          zip -r "../../$ZIP_NAME" zonvie.exe
          cd ../..

      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: "*.zip"

  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
